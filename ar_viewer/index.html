<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">

    <title>AR Product Viewer</title>

    <!-- Model Viewer -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.3.0/model-viewer.min.js"></script>

    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">

    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📦</text></svg>">
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading" class="loading">
        <div class="spinner"></div>
        <p class="loading-text">Loading 3D Model...</p>
        <p class="loading-subtext">Please wait</p>
    </div>

    <!-- Error Screen -->
    <div id="error" class="error hidden">
        <div class="error-icon">❌</div>
        <h2 class="error-title">Failed to Load Model</h2>
        <p class="error-message" id="errorMessage">Unknown error occurred</p>
        <button class="retry-button" onclick="location.reload()">Retry</button>
    </div>

    <!-- 3D Model Viewer -->
    <model-viewer
        id="modelViewer"
        class="model-viewer"
        alt="3D Product Model"
        ar
        ar-modes="webxr scene-viewer quick-look"
        camera-controls
        touch-action="pan-y"
        shadow-intensity="1"
        exposure="1"
        shadow-softness="0.5"
        auto-rotate
        auto-rotate-delay="3000"
        rotation-per-second="30deg"
        interaction-prompt="auto"
        camera-orbit="45deg 55deg 2.5m"
        min-camera-orbit="auto auto auto"
        max-camera-orbit="auto auto auto"
        min-field-of-view="25deg"
        max-field-of-view="45deg">

        <!-- AR Button -->
        <button slot="ar-button" class="ar-button" id="arButton">
            <svg class="ar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
            </svg>
            <span>View in Your Space</span>
        </button>

        <!-- Loading Progress Bar -->
        <div class="progress-bar" slot="progress-bar">
            <div class="update-bar"></div>
        </div>
    </model-viewer>

    <!-- Product Info Card -->
    <div id="productInfo" class="product-info hidden">
        <h1 class="product-name" id="productName">Product Name</h1>
        <p class="product-category" id="productCategory">Category</p>
        <p class="product-price" id="productPrice"></p>
        <p class="product-description" id="productDescription"></p>
    </div>

    <!-- Disclaimer -->
    <div id="disclaimer" class="disclaimer hidden">
        AR view is for size and appearance reference. Actual product may vary slightly.
    </div>

    <!-- Controls Help -->
    <div class="controls-help">
        <div class="control-item">
            <span class="control-icon">👆</span>
            <span class="control-text">Rotate</span>
        </div>
        <div class="control-item">
            <span class="control-icon">🤏</span>
            <span class="control-text">Zoom</span>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="fetch_models.js"></script>
</body>
</html>
